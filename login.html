<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>登录 | Whale Pictures</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: linear-gradient(135deg, #0a0a0a 0%, #1a1a2e 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    .container {
      background: rgba(255,255,255,0.05);
      backdrop-filter: blur(10px);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 20px;
      padding: 40px;
      max-width: 420px;
      width: 100%;
    }
    .logo {
      text-align: center;
      margin-bottom: 30px;
    }
    .logo h1 {
      color: #fff;
      font-size: 28px;
      font-weight: 600;
    }
    .logo p {
      color: rgba(255,255,255,0.5);
      font-size: 14px;
      margin-top: 5px;
    }
    .tabs {
      display: flex;
      margin-bottom: 25px;
      background: rgba(255,255,255,0.05);
      border-radius: 10px;
      padding: 4px;
    }
    .tab {
      flex: 1;
      padding: 12px;
      text-align: center;
      color: rgba(255,255,255,0.5);
      cursor: pointer;
      border-radius: 8px;
      transition: all 0.3s;
      font-size: 14px;
    }
    .tab.active {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: #fff;
    }
    .form-group {
      margin-bottom: 20px;
    }
    .form-group input {
      width: 100%;
      padding: 14px 16px;
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 10px;
      color: #fff;
      font-size: 16px;
      transition: all 0.3s;
    }
    .form-group input:focus {
      outline: none;
      border-color: #667eea;
      background: rgba(255,255,255,0.12);
    }
    .form-group input::placeholder {
      color: rgba(255,255,255,0.4);
    }
    .btn {
      width: 100%;
      padding: 14px;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      border: none;
      border-radius: 10px;
      color: #fff;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s;
    }
    .btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 10px 30px rgba(102, 126, 234, 0.4);
    }
    .btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
      transform: none;
    }
    .toggle-text {
      text-align: center;
      margin-top: 20px;
      color: rgba(255,255,255,0.5);
      font-size: 14px;
    }
    .toggle-text a {
      color: #667eea;
      text-decoration: none;
      cursor: pointer;
    }
    .error {
      background: rgba(255, 59, 48, 0.2);
      border: 1px solid rgba(255, 59, 48, 0.4);
      color: #ff6b6b;
      padding: 12px;
      border-radius: 10px;
      margin-bottom: 20px;
      font-size: 14px;
    }
    .success {
      background: rgba(48, 209, 88, 0.2);
      border: 1px solid rgba(48, 209, 88, 0.4);
      color: #30d158;
      padding: 12px;
      border-radius: 10px;
      margin-bottom: 20px;
      font-size: 14px;
    }
    .otp-display {
      text-align: center;
      padding: 20px;
      background: rgba(255,255,255,0.05);
      border-radius: 10px;
      margin-bottom: 20px;
      color: rgba(255,255,255,0.7);
    }
    .back-link {
      display: block;
      text-align: center;
      margin-top: 20px;
      color: rgba(255,255,255,0.5);
      text-decoration: none;
      font-size: 14px;
    }
    .back-link:hover {
      color: #667eea;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="logo">
      <h1>🐋 Whale Pictures</h1>
      <p>专业影视制作 · AI短剧 · 外籍模特</p>
    </div>
    
    <div id="error" class="error" style="display:none;"></div>
    <div id="success" class="success" style="display:none;"></div>
    
    <div class="tabs">
      <div class="tab active" id="emailTab" onclick="switchMode('email')">邮箱登录</div>
      <div class="tab" id="phoneTab" onclick="switchMode('phone')">手机登录</div>
    </div>
    
    <!-- Email Form -->
    <div id="emailForm">
      <div class="form-group">
        <input type="email" id="email" placeholder="电子邮箱" />
      </div>
      <div class="form-group">
        <input type="password" id="password" placeholder="密码" />
      </div>
      <button class="btn" id="emailBtn" onclick="handleEmailSubmit()">登录</button>
      <div class="toggle-text">
        <a id="toggleMode" onclick="toggleRegister()">没有账号？立即注册</a>
      </div>
    </div>
    
    <!-- Phone Form -->
    <div id="phoneForm" style="display:none;">
      <div id="phoneStep1">
        <div class="form-group">
          <input type="tel" id="phone" placeholder="手机号 (国际格式，如 +86...)" />
        </div>
        <button class="btn" id="phoneBtn" onclick="handlePhoneSend()">获取验证码</button>
      </div>
      <div id="phoneStep2" style="display:none;">
        <div class="otp-display">
          验证码已发送至 <span id="phoneDisplay"></span>
        </div>
        <div class="form-group">
          <input type="text" id="otp" placeholder="输入6位验证码" maxlength="6" />
        </div>
        <button class="btn" id="otpBtn" onclick="handleOTPVerify()">验证登录</button>
        <button class="btn" style="margin-top:10px; background: transparent; border: 1px solid rgba(255,255,255,0.2);" onclick="showPhoneStep1()">重新发送</button>
      </div>
    </div>
    
    <a href="index.html" class="back-link">← 返回首页</a>
  </div>

  <script>
    // Supabase Configuration
    const SUPABASE_URL = 'https://fczherphuixpdjuevzsh.supabase.co';
    const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImZjemhlcnBodWl4cGRqdWV2enNoIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM2NDM0OTEsImV4cCI6MjA4OTIxOTQ5MX0.t7FSUWbWDsKIcU-m-1ul65aVVu87RZn0zHleqccDEo4';
    
    const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
    
    let mode = 'email';
    let isRegister = false;
    let currentPhone = '';
    
    function showError(msg) {
      const el = document.getElementById('error');
      el.textContent = msg;
      el.style.display = 'block';
    }
    
    function showSuccess(msg) {
      const el = document.getElementById('success');
      el.textContent = msg;
      el.style.display = 'block';
    }
    
    function clearMessages() {
      document.getElementById('error').style.display = 'none';
      document.getElementById('success').style.display = 'none';
    }
    
    function switchMode(newMode) {
      mode = newMode;
      clearMessages();
      document.getElementById('emailTab').classList.toggle('active', mode === 'email');
      document.getElementById('phoneTab').classList.toggle('active', mode === 'phone');
      document.getElementById('emailForm').style.display = mode === 'email' ? 'block' : 'none';
      document.getElementById('phoneForm').style.display = mode === 'phone' ? 'block' : 'none';
      showPhoneStep1();
    }
    
    function showPhoneStep1() {
      document.getElementById('phoneStep1').style.display = 'block';
      document.getElementById('phoneStep2').style.display = 'none';
    }
    
    function showPhoneStep2() {
      document.getElementById('phoneStep1').style.display = 'none';
      document.getElementById('phoneStep2').style.display = 'block';
    }
    
    function toggleRegister() {
      isRegister = !isRegister;
      document.getElementById('emailBtn').textContent = isRegister ? '注册' : '登录';
      document.getElementById('toggleMode').textContent = isRegister ? '已有账号？登录' : '没有账号？立即注册';
      clearMessages();
    }
    
    async function handleEmailSubmit() {
      const email = document.getElementById('email').value;
      const password = document.getElementById('password').value;
      const btn = document.getElementById('emailBtn');
      
      if (!email || !password) {
        showError('请填写邮箱和密码');
        return;
      }
      
      btn.disabled = true;
      btn.textContent = '处理中...';
      clearMessages();
      
      try {
        if (isRegister) {
          const { error } = await supabase.auth.signUp({ email, password });
          if (error) throw error;
          showSuccess('注册成功！请查收验证邮件。');
          setTimeout(() => {
            isRegister = false;
            toggleRegister();
          }, 2000);
        } else {
          const { error } = await supabase.auth.signInWithPassword({ email, password });
          if (error) throw error;
          showSuccess('登录成功！正在跳转...');
          setTimeout(() => {
            window.location.href = 'index.html';
          }, 1000);
        }
      } catch (err) {
        showError(err.message || '操作失败');
      } finally {
        btn.disabled = false;
        btn.textContent = isRegister ? '注册' : '登录';
      }
    }
    
    async function handlePhoneSend() {
      let phone = document.getElementById('phone').value.trim();
      
      if (!phone) {
        showError('请输入手机号');
        return;
      }
      
      // Ensure + prefix
      if (!phone.startsWith('+')) {
        phone = '+' + phone;
      }
      
      const btn = document.getElementById('phoneBtn');
      btn.disabled = true;
      btn.textContent = '发送中...';
      clearMessages();
      
      try {
        const { error } = await supabase.auth.signInWithOtp({
          phone: phone,
          options: { channel: 'sms' }
        });
        
        if (error) throw error;
        
        currentPhone = phone;
        document.getElementById('phoneDisplay').textContent = phone;
        showPhoneStep2();
        showSuccess('验证码已发送！');
      } catch (err) {
        showError(err.message || '发送失败');
      } finally {
        btn.disabled = false;
        btn.textContent = '获取验证码';
      }
    }
    
    async function handleOTPVerify() {
      const otp = document.getElementById('otp').value.trim();
      
      if (!otp || otp.length !== 6) {
        showError('请输入6位验证码');
        return;
      }
      
      const btn = document.getElementById('otpBtn');
      btn.disabled = true;
      btn.textContent = '验证中...';
      clearMessages();
      
      try {
        const { error } = await supabase.auth.verifyOtp({
          phone: currentPhone,
          token: otp,
          type: 'sms'
        });
        
        if (error) throw error;
        
        showSuccess('登录成功！正在跳转...');
        setTimeout(() => {
          window.location.href = 'index.html';
        }, 1000);
      } catch (err) {
        showError(err.message || '验证码错误');
      } finally {
        btn.disabled = false;
        btn.textContent = '验证登录';
      }
    }
    
    // Check if already logged in
    supabase.auth.getSession().then(({ data }) => {
      if (data.session) {
        window.location.href = 'index.html';
      }
    });
  </script>
</body>
</html>
