<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>登录 | Whale Pictures</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: linear-gradient(135deg, #0a0a0a 0%, #1a1a2e 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    .container {
      background: rgba(255,255,255,0.05);
      backdrop-filter: blur(10px);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 20px;
      padding: 40px;
      max-width: 420px;
      width: 100%;
    }
    .logo { text-align: center; margin-bottom: 30px; }
    .logo h1 { color: #fff; font-size: 28px; font-weight: 600; }
    .logo p { color: rgba(255,255,255,0.5); font-size: 14px; margin-top: 5px; }
    .tabs {
      display: flex;
      margin-bottom: 25px;
      background: rgba(255,255,255,0.05);
      border-radius: 10px;
      padding: 4px;
    }
    .tab {
      flex: 1;
      padding: 12px;
      text-align: center;
      color: rgba(255,255,255,0.5);
      cursor: pointer;
      border-radius: 8px;
      transition: all 0.3s;
      font-size: 14px;
    }
    .tab.active {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: #fff;
    }
    .form-group { margin-bottom: 18px; }
    .form-group input {
      width: 100%;
      padding: 14px 16px;
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 10px;
      color: #fff;
      font-size: 16px;
      transition: all 0.3s;
    }
    .form-group input:focus {
      outline: none;
      border-color: #667eea;
      background: rgba(255,255,255,0.12);
    }
    .form-group input::placeholder { color: rgba(255,255,255,0.4); }
    .btn {
      width: 100%;
      padding: 14px;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      border: none;
      border-radius: 10px;
      color: #fff;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s;
    }
    .btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 10px 30px rgba(102, 126, 234, 0.4);
    }
    .btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }
    .btn-secondary {
      background: transparent;
      border: 1px solid rgba(255,255,255,0.2);
      margin-top: 10px;
    }
    .btn-secondary:hover {
      background: rgba(255,255,255,0.1);
      box-shadow: none;
    }
    .remember-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 20px;
      font-size: 14px;
    }
    .remember-row label {
      color: rgba(255,255,255,0.6);
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .remember-row input[type="checkbox"] {
      width: 18px;
      height: 18px;
      accent-color: #667eea;
    }
    .forgot-link {
      color: #667eea;
      text-decoration: none;
      cursor: pointer;
    }
    .forgot-link:hover { text-decoration: underline; }
    .toggle-text {
      text-align: center;
      margin-top: 20px;
      color: rgba(255,255,255,0.5);
      font-size: 14px;
    }
    .toggle-text a { color: #667eea; text-decoration: none; cursor: pointer; }
    .error {
      background: rgba(255, 59, 48, 0.2);
      border: 1px solid rgba(255, 59, 48, 0.4);
      color: #ff6b6b;
      padding: 12px;
      border-radius: 10px;
      margin-bottom: 20px;
      font-size: 14px;
    }
    .success {
      background: rgba(48, 209, 88, 0.2);
      border: 1px solid rgba(48, 209, 88, 0.4);
      color: #30d158;
      padding: 12px;
      border-radius: 10px;
      margin-bottom: 20px;
      font-size: 14px;
    }
    .otp-display {
      text-align: center;
      padding: 20px;
      background: rgba(255,255,255,0.05);
      border-radius: 10px;
      margin-bottom: 20px;
      color: rgba(255,255,255,0.7);
    }
    .back-link {
      display: block;
      text-align: center;
      margin-top: 20px;
      color: rgba(255,255,255,0.5);
      text-decoration: none;
      font-size: 14px;
    }
    .back-link:hover { color: #667eea; }
    .hidden { display: none !important; }
    .countdown {
      font-size: 12px;
      color: rgba(255,255,255,0.5);
      margin-left: 10px;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="logo">
      <h1>🐋 Whale Pictures</h1>
      <p>专业影视制作 · AI短剧 · 外籍模特</p>
    </div>
    
    <div id="error" class="error hidden"></div>
    <div id="success" class="success hidden"></div>
    
    <div class="tabs">
      <div class="tab active" id="emailTab" onclick="switchMode('email')">邮箱登录</div>
      <div class="tab" id="phoneTab" onclick="switchMode('phone')">手机登录</div>
    </div>
    
    <!-- 邮箱表单 -->
    <div id="emailForm">
      <!-- 登录 -->
      <div id="loginSection">
        <div class="form-group">
          <input type="email" id="email" placeholder="电子邮箱" autocomplete="email" />
        </div>
        <div class="form-group">
          <input type="password" id="password" placeholder="密码" autocomplete="current-password" />
        </div>
        <div class="remember-row">
          <label>
            <input type="checkbox" id="rememberMe" />
            记住我
          </label>
          <a class="forgot-link" onclick="showForgotPassword()">忘记密码？</a>
        </div>
        <button class="btn" id="emailBtn" onclick="handleEmailSubmit()">登录</button>
        <div class="toggle-text">
          <a onclick="toggleRegister()">没有账号？立即注册</a>
        </div>
      </div>
      
      <!-- 注册 -->
      <div id="registerSection" class="hidden">
        <div class="form-group">
          <input type="email" id="regEmail" placeholder="电子邮箱" autocomplete="email" />
        </div>
        <div class="form-group">
          <input type="password" id="regPassword" placeholder="设置密码（至少6位）" autocomplete="new-password" />
        </div>
        <div class="form-group">
          <input type="password" id="regPasswordConfirm" placeholder="确认密码" autocomplete="new-password" />
        </div>
        <button class="btn" id="regBtn" onclick="handleRegister()">注册</button>
        <div class="toggle-text">
          <a onclick="toggleRegister()">已有账号？立即登录</a>
        </div>
      </div>
      
      <!-- 忘记密码 -->
      <div id="forgotSection" class="hidden">
        <div class="form-group">
          <input type="email" id="forgotEmail" placeholder="输入注册邮箱" />
        </div>
        <button class="btn" id="forgotBtn" onclick="handleForgotPassword()">发送重置链接</button>
        <button class="btn btn-secondary" onclick="showLogin()">返回登录</button>
      </div>
    </div>
    
    <!-- 手机表单 -->
    <div id="phoneForm" class="hidden">
      <div id="phoneStep1">
        <div class="form-group">
          <input type="tel" id="phone" placeholder="手机号 (国际格式，如 +86...)" />
        </div>
        <button class="btn" id="phoneBtn" onclick="handlePhoneSend()">获取验证码</button>
      </div>
      <div id="phoneStep2" class="hidden">
        <div class="otp-display">
          验证码已发送至 <span id="phoneDisplay"></span>
        </div>
        <div class="form-group">
          <input type="text" id="otp" placeholder="输入6位验证码" maxlength="6" />
        </div>
        <button class="btn" id="otpBtn" onclick="handleOTPVerify()">验证登录</button>
        <button class="btn btn-secondary" onclick="showPhoneStep1()">重新发送 <span id="countdown" class="countdown"></span></button>
      </div>
    </div>
    
    <a href="index.html" class="back-link">← 返回首页</a>
  </div>

  <script>
    const SUPABASE_URL = 'https://fczherphuixpdjuevzsh.supabase.co';
    const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImZjemhlcnBodWl4cGRqdWV2enNoIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM2NDM0OTEsImV4cCI6MjA4OTIxOTQ5MX0.t7FSUWbWDsKIcU-m-1ul65aVVu87RZn0zHleqccDEo4';
    
    const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
    
    let mode = 'email';
    let isRegister = false;
    let currentPhone = '';
    let countdownTimer = null;
    const RESEND_COOLDOWN = 60;
    
    function $(id) { return document.getElementById(id); }
    
    function showError(msg) {
      const el = $('error');
      el.textContent = msg;
      el.classList.remove('hidden');
    }
    
    function showSuccess(msg) {
      const el = $('success');
      el.textContent = msg;
      el.classList.remove('hidden');
    }
    
    function clearMessages() {
      $('error').classList.add('hidden');
      $('success').classList.add('hidden');
    }
    
    function switchMode(newMode) {
      mode = newMode;
      clearMessages();
      $('emailTab').classList.toggle('active', mode === 'email');
      $('phoneTab').classList.toggle('active', mode === 'phone');
      $('emailForm').classList.toggle('hidden', mode !== 'email');
      $('phoneForm').classList.toggle('hidden', mode !== 'phone');
      if (mode === 'phone') showPhoneStep1();
    }
    
    function showPhoneStep1() {
      $('phoneStep1').classList.remove('hidden');
      $('phoneStep2').classList.add('hidden');
      $('phone').value = '';
      $('otp').value = '';
      clearCountdown();
    }
    
    function showPhoneStep2() {
      $('phoneStep1').classList.add('hidden');
      $('phoneStep2').classList.remove('hidden');
    }
    
    function showLogin() {
      $('loginSection').classList.remove('hidden');
      $('registerSection').classList.add('hidden');
      $('forgotSection').classList.add('hidden');
    }
    
    function showForgotPassword() {
      clearMessages();
      $('loginSection').classList.add('hidden');
      $('registerSection').classList.add('hidden');
      $('forgotSection').classList.remove('hidden');
      $('forgotEmail').value = $('email').value || '';
    }
    
    function toggleRegister() {
      isRegister = !isRegister;
      clearMessages();
      if (isRegister) {
        $('loginSection').classList.add('hidden');
        $('forgotSection').classList.add('hidden');
        $('registerSection').classList.remove('hidden');
      } else {
        $('registerSection').classList.add('hidden');
        $('loginSection').classList.remove('hidden');
      }
    }
    
    function startCountdown(btnId, countdownId) {
      let seconds = RESEND_COOLDOWN;
      const btn = $(btnId);
      const display = $(countdownId);
      
      function tick() {
        if (seconds > 0) {
          display.textContent = `(${seconds}s)`;
          btn.disabled = true;
          seconds--;
          countdownTimer = setTimeout(tick, 1000);
        } else {
          display.textContent = '';
          btn.disabled = false;
        }
      }
      tick();
    }
    
    function clearCountdown() {
      if (countdownTimer) {
        clearTimeout(countdownTimer);
        countdownTimer = null;
      }
      $('countdown').textContent = '';
    }
    
    // 记住我 - 保存到 localStorage
    function loadRememberedEmail() {
      const remembered = localStorage.getItem('remembered_email');
      if (remembered) {
        $('email').value = remembered;
        $('rememberMe').checked = true;
      }
    }
    
    async function handleEmailSubmit() {
      const email = $('email').value.trim();
      const password = $('password').value;
      const rememberMe = $('rememberMe').checked;
      const btn = $('emailBtn');
      
      if (!email || !password) {
        showError('请填写邮箱和密码');
        return;
      }
      
      btn.disabled = true;
      btn.textContent = '登录中...';
      clearMessages();
      
      try {
        const { error } = await supabase.auth.signInWithPassword({ email, password });
        if (error) throw error;
        
        // 记住我
        if (rememberMe) {
          localStorage.setItem('remembered_email', email);
        } else {
          localStorage.removeItem('remembered_email');
        }
        
        showSuccess('登录成功！正在跳转...');
        setTimeout(() => { window.location.href = 'index.html'; }, 1000);
      } catch (err) {
        showError(err.message || '登录失败');
      } finally {
        btn.disabled = false;
        btn.textContent = '登录';
      }
    }
    
    async function handleRegister() {
      const email = $('regEmail').value.trim();
      const password = $('regPassword').value;
      const passwordConfirm = $('regPasswordConfirm').value;
      const btn = $('regBtn');
      
      if (!email || !password) {
        showError('请填写邮箱和密码');
        return;
      }
      if (password.length < 6) {
        showError('密码至少6位');
        return;
      }
      if (password !== passwordConfirm) {
        showError('两次密码不一致');
        return;
      }
      
      btn.disabled = true;
      btn.textContent = '注册中...';
      clearMessages();
      
      try {
        const { error } = await supabase.auth.signUp({ 
          email, 
          password,
          options: {
            emailConfirm: true  // 启用邮箱验证
          }
        });
        if (error) throw error;
        
        showSuccess('注册成功！请查收验证邮件并点击链接激活账号。');
        $('regEmail').value = '';
        $('regPassword').value = '';
        $('regPasswordConfirm').value = '';
        setTimeout(() => toggleRegister(), 3000);
      } catch (err) {
        showError(err.message || '注册失败');
      } finally {
        btn.disabled = false;
        btn.textContent = '注册';
      }
    }
    
    async function handleForgotPassword() {
      const email = $('forgotEmail').value.trim();
      const btn = $('forgotBtn');
      
      if (!email) {
        showError('请输入邮箱地址');
        return;
      }
      
      btn.disabled = true;
      btn.textContent = '发送中...';
      clearMessages();
      
      try {
        const { error } = await supabase.auth.resetPasswordForEmail(email, {
          redirectTo: window.location.origin + '/login.html?reset=true'
        });
        if (error) throw error;
        
        showSuccess('密码重置链接已发送到邮箱，请查收！');
        $('forgotEmail').value = '';
      } catch (err) {
        showError(err.message || '发送失败');
      } finally {
        btn.disabled = false;
        btn.textContent = '发送重置链接';
      }
    }
    
    async function handlePhoneSend() {
      let phone = $('phone').value.trim();
      
      if (!phone) {
        showError('请输入手机号');
        return;
      }
      if (!phone.startsWith('+')) {
        phone = '+' + phone;
      }
      
      const btn = $('phoneBtn');
      btn.disabled = true;
      btn.textContent = '发送中...';
      clearMessages();
      
      try {
        const { error } = await supabase.auth.signInWithOtp({
          phone: phone,
          options: { channel: 'sms' }
        });
        if (error) throw error;
        
        currentPhone = phone;
        $('phoneDisplay').textContent = phone;
        showPhoneStep2();
        showSuccess('验证码已发送！');
        startCountdown('phoneBtn', 'countdown');
      } catch (err) {
        showError(err.message || '发送失败');
      } finally {
        btn.disabled = false;
        btn.textContent = '获取验证码';
      }
    }
    
    async function handleOTPVerify() {
      const otp = $('otp').value.trim();
      const btn = $('otpBtn');
      
      if (!otp || otp.length !== 6) {
        showError('请输入6位验证码');
        return;
      }
      
      btn.disabled = true;
      btn.textContent = '验证中...';
      clearMessages();
      
      try {
        const { error } = await supabase.auth.verifyOtp({
          phone: currentPhone,
          token: otp,
          type: 'sms'
        });
        if (error) throw error;
        
        showSuccess('登录成功！正在跳转...');
        setTimeout(() => { window.location.href = 'index.html'; }, 1000);
      } catch (err) {
        showError(err.message || '验证码错误');
      } finally {
        btn.disabled = false;
        btn.textContent = '验证登录';
      }
    }
    
    // 初始化
    loadRememberedEmail();
    
    // 检查是否已登录
    supabase.auth.getSession().then(({ data }) => {
      if (data.session) {
        window.location.href = 'index.html';
      }
    });
    
    // 处理 URL 参数（密码重置回调）
    const urlParams = new URLSearchParams(window.location.search);
    if (urlParams.get('reset') === 'true') {
      // 显示密码重置界面
      $('loginSection').classList.add('hidden');
      $('forgotSection').classList.remove('hidden');
    }
  </script>
</body>
</html>
